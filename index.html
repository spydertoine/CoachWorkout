<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Workout Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-text: #1d1d1f;
            --apple-sub: #86868b;
            --accent-blue: #007aff;
            --rest-gray: #d2d2d7;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #e2e2ff, transparent),
                radial-gradient(circle at bottom left, #ffe2e2, transparent),
                var(--apple-bg);
            background-attachment: fixed;
            color: var(--apple-text);
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header Style Inès & Zoé avec Dégradé */
        header {
            margin-bottom: 40px;
            padding-left: 5px;
        }

        .welcome-label {
            color: var(--apple-sub);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            display: block;
            margin-bottom: 4px;
        }

        h1 {
            font-size: clamp(34px, 8vw, 42px);
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            color: var(--apple-text);
        }

        /* Classe pour l'effet de couleur sur le prénom */
        .gradient-text {
            background: linear-gradient(to right, #5e5ce6, #ff2d55, #ff9f0a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Onglet Suivi Santé */
        .suivi-bar {
            background: var(--apple-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease;
        }

        .suivi-bar:active {
            transform: scale(0.98);
        }

        .suivi-icon {
            width: 40px;
            height: 40px;
            background: #e5e5ea;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-weight: 800;
        }

        /* Grille des jours */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .workout-card {
            text-decoration: none;
            color: inherit;
            background: var(--apple-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .workout-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
        }

        .icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            margin-bottom: 15px;
            background: var(--accent-blue);
            transition: background 0.3s ease;
        }

        .rest-day .icon-circle {
            background: var(--rest-gray) !important;
        }

        .rest-day .btn-start {
            color: var(--apple-sub);
        }

        .card-header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        .card-header p {
            margin: 5px 0 0;
            color: var(--apple-sub);
            font-size: 15px;
        }

        .btn-start {
            margin-top: 20px;
            background: #f2f2f7;
            color: var(--accent-blue);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }

        /* Aujourd'hui */
        @keyframes soft-vibrate {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }
        }

        .card-today {
            border: 2px solid var(--accent-blue) !important;
            animation: soft-vibrate 3s ease-in-out infinite;
        }

        .badge-today {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--accent-blue);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <span class="welcome-label">Mon programme</span>
            <h1 id="user-welcome">Bonjour !</h1>
        </header>

        <a href="suivi.html" class="suivi-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="suivi-icon">%</div>
                <div>
                    <div style="font-weight: 700;">Mon Suivi Santé</div>
                    <div style="font-size: 13px; color: var(--apple-sub);">IMC, Poids et Macros</div>
                </div>
            </div>
            <div style="font-weight: 700; color: var(--accent-blue);">Détails ›</div>
        </a>

        <div class="nav-grid">
            <a href="lundi.html" class="workout-card" id="card-1">
                <div>
                    <div class="icon-circle"></div>
                    <div class="card-header">
                        <h2>Lundi</h2>
                        <p>/</p>
                    </div>
                </div>
                <div class="btn-start">Voir la séance</div>
            </a>
            <a href="mardi.html" class="workout-card" id="card-2">
                <div>
                    <div class="icon-circle"></div>
                    <div class="card-header">
                        <h2>Mardi</h2>
                        <p>/</p>
                    </div>
                </div>
                <div class="btn-start">Voir la séance</div>
            </a>
            <a href="repos.html" class="workout-card rest-day" id="card-3">
                <div>
                    <div class="icon-circle"></div>
                    <div class="card-header">
                        <h2>Mercredi</h2>
                        <p>/</p>
                    </div>
                </div>
                <div class="btn-start">Conseils repos</div>
            </a>
            <a href="jeudi.html" class="workout-card" id="card-4">
                <div>
                    <div class="icon-circle"></div>
                    <div class="card-header">
                        <h2>Jeudi</h2>
                        <p>/</p>
                    </div>
                </div>
                <div class="btn-start">Voir la séance</div>
            </a>
            <a href="vendredi.html" class="workout-card" id="card-5">
                <div>
                    <div class="icon-circle"></div>
                    <div class="card-header">
                        <h2>Vendredi</h2>
                        <p>/</p>
                    </div>
                </div>
                <div class="btn-start">Voir la séance</div>
            </a>
            <a href="repos.html" class="workout-card rest-day" id="card-6">
                <div>
                    <div class="icon-circle"></div>
                    <div class="card-header">
                        <h2>Samedi</h2>
                        <p>/</p>
                    </div>
                </div>
                <div class="btn-start">Conseils repos</div>
            </a>
            <a href="repos.html" class="workout-card rest-day" id="card-0">
                <div>
                    <div class="icon-circle"></div>
                    <div class="card-header">
                        <h2>Dimanche</h2>
                        <p>/</p>
                    </div>
                </div>
                <div class="btn-start">Détente</div>
            </a>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('userProfile'));
        if (!userData) {
            window.location.href = 'login.html';
        } else {
            // Application du dégradé Inès & Zoé sur le prénom
            const firstName = userData.prenom || "!";
            document.getElementById('user-welcome').innerHTML = `Bonjour <span class="gradient-text">${firstName}</span> !`;
        }

        const today = new Date().getDay();
        const activeCard = document.getElementById('card-' + today);
        if (activeCard) {
            activeCard.classList.add('card-today');
            const badge = document.createElement('span');
            badge.className = 'badge-today';
            badge.innerText = "AUJOURD'HUI";
            activeCard.appendChild(badge);
        }
    </script>
</body>

</html>
