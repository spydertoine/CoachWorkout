<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lundi | Workout</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --accent: #007aff;
            --watch-case: #121214;
            --watch-band: #2c2c2e;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #e2e2ff, transparent), var(--apple-bg);
            margin: 0; padding: 15px; -webkit-font-smoothing: antialiased;
            overflow-x: hidden; /* Empêche le scroll horizontal du bracelet */
        }

        .container { max-width: 500px; margin: 0 auto; padding-bottom: 120px; }

        /* --- LA MONTRE : FIX RÉALISTE --- */
        .watch-banner {
            position: sticky; top: 10px; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 110px; margin-bottom: 40px;
        }

        /* Bracelets ajustables pour ne pas déborder */
        .band-left, .band-right {
            height: 60px; background: var(--watch-band); flex: 1; position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background-image: radial-gradient(circle at 50% 10%, rgba(255,255,255,0.08), transparent 70%);
        }
        .band-left { border-radius: 40px 0 0 40px; min-width: 40px; }
        .band-right { border-radius: 0 40px 40px 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; gap: 5px; min-width: 130px; }

        /* BOITIER : Verrouillage total du format */
        .watch-case {
            width: 100px; height: 100px; border-radius: 30px; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            position: relative; flex-shrink: 0; margin: 0 -5px; /* Chevauchement léger pour le réalisme */
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%), var(--watch-case);
            border: 2px solid #3a3a3c;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4), inset 0 2px 3px rgba(255,255,255,0.1);
        }

        /* Centrage absolu du texte et du cercle */
        .timer-wrapper {
            position: relative; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
        }

        #timer-display {
            color: white; font-size: 18px; font-weight: 800;
            font-variant-numeric: tabular-nums;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* CENTRE MORT */
            margin: 0; padding: 0; line-height: 1;
        }

        .progress-ring { transform: rotate(-90deg); }
        .progress-ring__circle { transition: stroke-dashoffset 0.3s linear; stroke-linecap: round; }

        /* BOUTONS PLUS COMPACTS POUR IPHONE */
        .btn-watch {
            border: none; color: white; height: 36px; padding: 0 10px;
            border-radius: 18px; font-weight: 700; font-size: 10px;
            text-transform: uppercase; cursor: pointer;
        }
        .btn-start { background-color: var(--accent); width: 60px; }
        .btn-reset { background-color: #3a3a3c; font-size: 9px; }

        /* --- CARTES --- */
        .ex-card { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-radius: 28px; padding: 25px; margin-bottom: 20px; border: 1px solid white; }
        .ex-title h3 { margin: 0; font-size: 20px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .perf-input { background: #f2f2f7; border: none; padding: 16px; border-radius: 14px; text-align: center; font-size: 16px; font-weight: 700; font-family: inherit; }
        
        .btn-finish { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 500px; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 22px; font-weight: 700; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="watch-banner">
            <div class="band-left"></div>
            
            <div class="watch-case">
                <div class="timer-wrapper">
                    <svg class="progress-ring" width="80" height="80">
                        <circle stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="transparent" r="36" cx="40" cy="40"/>
                        <circle id="timer-circle" class="progress-ring__circle" stroke="var(--accent)" stroke-width="4" fill="transparent" r="36" cx="40" cy="40"/>
                    </svg>
                    <div id="timer-display">01:30</div>
                </div>
            </div>

            <div class="band-right">
                <button class="btn-watch btn-reset" onclick="resetTimer()">Reset</button>
                <button class="btn-watch btn-start" onclick="toggleTimer()" id="btn-timer">Start</button>
            </div>
        </div>

        <header style="margin-bottom: 20px;">
            <span style="font-weight:700; font-size:12px; color:var(--watch-band); text-transform: uppercase; letter-spacing: 1px;">Lundi</span>
            <h1 style="font-size:32px; font-weight:800; margin:0;">Pecs et Triceps</h1>
        </header>

        <form id="workoutForm">
            <div class="ex-card">
                <div class="ex-title" onclick="openModal('dips.jpg')">
                    <h3>Dips Pectoraux</h3>
                    <p style="margin:5px 0 15px; color:#86868b; font-size:14px;">4 séries • 8-12 reps</p>
                </div>
                <div class="perf-grid">
                    <input type="number" class="perf-input" name="ex1_poids" placeholder="Poids (kg)">
                    <input type="number" class="perf-input" name="ex1_reps" placeholder="Répétitions">
                </div>
            </div>
            <button type="button" class="btn-finish" id="submitWorkout">Enregistrer la séance</button>
        </form>
    </div>

    <script type="module">
        // --- LOGIQUE IDENTIQUE ---
        const circle = document.getElementById('timer-circle');
        const circumference = 36 * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        
        let secondsLeft = 90;
        let timerInterval = null;

        window.toggleTimer = function() {
            const btn = document.getElementById('btn-timer');
            if (timerInterval) {
                clearInterval(timerInterval); timerInterval = null;
                btn.innerText = "Start";
            } else {
                btn.innerText = "Pause";
                timerInterval = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft <= 0) {
                        clearInterval(timerInterval); secondsLeft = 0; updateDisplay();
                    } else {
                        updateDisplay();
                        const offset = circumference - (((90 - secondsLeft) / 90) * circumference);
                        circle.style.strokeDashoffset = offset;
                    }
                }, 1000);
            }
        }

        window.resetTimer = function() {
            clearInterval(timerInterval); timerInterval = null;
            secondsLeft = 90; updateDisplay(); circle.style.strokeDashoffset = 0;
            document.getElementById('btn-timer').innerText = "Start";
        }

        function updateDisplay() {
            let m = Math.floor(secondsLeft / 60);
            let s = secondsLeft % 60;
            document.getElementById('timer-display').textContent = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }
        updateDisplay();
    </script>
</body>
</html>
