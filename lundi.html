<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lundi | Workout Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.85);
            --accent: #007aff;
            --pause-yellow: #ffcc00;
            /* Jaune Apple Watch Ultra */
            --error: #ff3b30;
            --watch-case: #121214;
            /* Noir profond saphir */
            --watch-band: #2c2c2e;
            /* Gris silicone Sport Band */
        }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #e2e2ff, transparent), var(--apple-bg);
            background-attachment: fixed;
            margin: 0;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 120px;
            transition: max-width 0.3s ease;
        }

        /* --- DESIGN MONTRE DÉPLIÉE ULTRA RÉALISTE & FIXÉE --- */
        .watch-banner {
            position: sticky;
            top: 10px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 110px;
            width: 100%;
            margin-bottom: 40px;
        }

        /* Bracelet bombé et texturé 3D réaliste */
        .band-left,
        .band-right {
            height: 65px;
            background: var(--watch-band);
            flex: 1;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            /* Dégradé pour effet silicone bombé */
            background-image: radial-gradient(circle at 50% 10%, rgba(255, 255, 255, 0.08), transparent 70%);
            display: flex;
            align-items: center;
        }

        .band-left {
            border-radius: 40px 0 0 40px;
            justify-content: center;
        }

        .band-right {
            border-radius: 0 40px 40px 0;
            justify-content: flex-end;
            padding-right: 12px;
            gap: 6px;
            min-width: 140px;
        }

        /* Effet texture bracelet sport 3D discret gravé */
        .band-text {
            color: rgba(255, 255, 255, 0.12);
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* Boîtier Ultra Réaliste (Taille Mobile-First) */
        .watch-case {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            margin: 0 -5px;
            /* Chevauchement réaliste */

            /* Fond verre profond + Reflet de lumière spéculaire (effet saphir) */
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 40%, transparent 60%, rgba(255, 255, 255, 0.05) 100%),
                var(--watch-case);

            /* Bords polis biseautés (aluminium) */
            border: 2px solid #3a3a3c;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.4),
                /* Ombre portée */
                inset 0 2px 3px rgba(255, 255, 255, 0.2),
                /* Biseau lumineux haut */
                inset 0 -2px 3px rgba(0, 0, 0, 0.4);
            /* Biseau ombre bas */
        }

        /* Conteneur de centrage absolu pour le cadran */
        .timer-wrapper {
            position: relative;
            width: 84px;
            height: 84px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Temps au CENTRE MORT DU CADRAN (FIX IPHONE) */
        #timer-display {
            color: white;
            font-size: 18px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            z-index: 3;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* CENTRE MORT */
            margin: 0;
            padding: 0;
            line-height: 1;
        }

        /* Cercle SVG lumineux */
        .progress-ring {
            transform: rotate(-90deg);
            position: absolute;
            filter: drop-shadow(0 0 3px rgba(0, 122, 255, 0.5));
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.3s linear;
            stroke-linecap: round;
        }

        /* BOUTONS PHYSIQUES RÉALISTES */
        .btn-watch {
            border: none;
            color: white;
            height: 38px;
            padding: 0 14px;
            border-radius: 19px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 0.3px;

            /* Dégradé métallique bombé */
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), transparent);

            /* Ombre portée et biseau lumineux */
            box-shadow:
                0 4px 6px rgba(0, 0, 0, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        /* Couleur des boutons avec l'effet métallique */
        .btn-start {
            background-color: var(--accent);
            min-width: 65px;
        }

        .btn-pause {
            background-color: var(--pause-yellow);
            color: #000;
            min-width: 65px;
        }

        /* JAUNE AVEC TEXTE NOIR */
        .btn-reset {
            background-color: #3a3a3c;
            /* Gris Digital Crown */
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.05), transparent);
            font-size: 10px;
        }

        /* Effet de pression sur les boutons */
        .btn-watch:active {
            transform: translateY(1px);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* --- CONTENU --- */
        header {
            margin-bottom: 25px;
            padding-left: 5px;
        }

        .ex-card {
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 25px;
            margin-bottom: 20px;
        }

        .ex-title h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            cursor: pointer;
        }

        .perf-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .perf-input {
            background: #f2f2f7;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

        .perf-input:focus {
            border-color: var(--accent);
            background: white;
        }

        .btn-finish {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 500px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 19px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 122, 255, 0.3);
        }

        /* DENSIFICATION PC */
        @media (min-width: 768px) {
            .container {
                max-width: 750px;
            }

            .watch-banner {
                height: 140px;
            }

            .watch-case {
                width: 130px;
                height: 130px;
                border-radius: 38px;
            }

            .timer-wrapper {
                width: 110px;
                height: 110px;
            }

            .progress-ring {
                width: 110px;
                height: 110px;
            }

            #timer-display {
                font-size: 24px;
            }

            .band-left,
            .band-right {
                height: 80px;
            }

            .btn-watch {
                height: 45px;
                font-size: 13px;
                border-radius: 22px;
            }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 95%;
            max-height: 85%;
            border-radius: 25px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="watch-banner">
            <div class="band-left"><span class="band-text">Sport Band</span></div>
            <div class="watch-case">
                <div class="timer-wrapper">
                    <svg class="progress-ring" id="svg-ring" width="84" height="84">
                        <circle id="bg-circle" stroke="rgba(255,255,255,0.08)" stroke-width="4" fill="transparent"
                            r="38" cx="42" cy="42" />
                        <circle id="timer-circle" class="progress-ring__circle" stroke="var(--accent)" stroke-width="4"
                            fill="transparent" r="38" cx="42" cy="42" />
                    </svg>
                    <div id="timer-display">01:30</div>
                </div>
            </div>
            <div class="band-right">
                <button class="btn-watch btn-reset" onclick="resetTimer()">Reset</button>
                <button class="btn-watch btn-start" onclick="toggleTimer()" id="btn-timer">Start</button>
            </div>
        </div>

        <header>
            <span
                style="color:var(--accent); font-weight:700; font-size:12px; letter-spacing:1.2px; text-transform: uppercase;">Lundi</span>
            <h1 style="font-size:32px; font-weight:800; margin:0;">Pecs et Triceps</h1>
        </header>

        <form id="workoutForm">
            <div class="ex-card">
                <div class="ex-header" style="margin-bottom: 20px;">
                    <div class="ex-title" onclick="openModal('dips.jpg')">
                        <h3>Dips Pectoraux</h3>
                        <p style="margin:5px 0 0; color:#86868b; font-size:14px;">4 séries • 8-12 reps</p>
                    </div>
                </div>

                <div class="perf-grid">
                    <input type="number" class="perf-input" name="ex1_poids" placeholder="Poids (kg)">
                    <input type="number" class="perf-input" name="ex1_reps" placeholder="Répétitions">
                </div>
            </div>
            <form id="workoutForm">
                <div class="ex-card">
                    <div class="ex-header" style="margin-bottom: 20px;">
                        <div class="ex-title" onclick="openModal('dips.jpg')">
                            <h3>Dips Pectoraux</h3>
                            <p style="margin:5px 0 0; color:#86868b; font-size:14px;">4 séries • 8-12 reps</p>
                        </div>
                    </div>

                    <div class="perf-grid">
                        <input type="number" class="perf-input" name="ex1_poids" placeholder="Poids (kg)">
                        <input type="number" class="perf-input" name="ex1_reps" placeholder="Répétitions">
                    </div>
                </div>
                <form id="workoutForm">
                    <div class="ex-card">
                        <div class="ex-header" style="margin-bottom: 20px;">
                            <div class="ex-title" onclick="openModal('dips.jpg')">
                                <h3>Dips Pectoraux</h3>
                                <p style="margin:5px 0 0; color:#86868b; font-size:14px;">4 séries • 8-12 reps</p>
                            </div>
                        </div>

                        <div class="perf-grid">
                            <input type="number" class="perf-input" name="ex1_poids" placeholder="Poids (kg)">
                            <input type="number" class="perf-input" name="ex1_reps" placeholder="Répétitions">
                        </div>
                    </div>
                    <form id="workoutForm">
                        <div class="ex-card">
                            <div class="ex-header" style="margin-bottom: 20px;">
                                <div class="ex-title" onclick="openModal('dips.jpg')">
                                    <h3>Dips Pectoraux</h3>
                                    <p style="margin:5px 0 0; color:#86868b; font-size:14px;">4 séries • 8-12 reps</p>
                                </div>
                            </div>

                            <div class="perf-grid">
                                <input type="number" class="perf-input" name="ex1_poids" placeholder="Poids (kg)">
                                <input type="number" class="perf-input" name="ex1_reps" placeholder="Répétitions">
                            </div>
                        </div>
                        <button type="button" class="btn-finish" id="submitWorkout">Enregistrer la séance</button>
                    </form>
    </div>

    <div id="myModal" class="modal" onclick="closeModal()"><img class="modal-content" id="imgModal"></div>

    <script type="module">
        // --- ADAPTATION DYNAMIQUE DU SVG (PC FIX) ---
        const updateSVGParams = () => {
            const isDesktop = window.innerWidth >= 768;
            const r = isDesktop ? 50 : 38;
            const c = isDesktop ? 55 : 42;
            const ring = document.getElementById('svg-ring');
            const bgC = document.getElementById('bg-circle');
            const tmC = document.getElementById('timer-circle');
            if (isDesktop) { ring.setAttribute('width', '110'); ring.setAttribute('height', '110'); }
            else { ring.setAttribute('width', '84'); ring.setAttribute('height', '84'); }
            [bgC, tmC].forEach(circle => { circle.setAttribute('r', r); circle.setAttribute('cx', c); circle.setAttribute('cy', c); });
            return r * 2 * Math.PI;
        };

        let circumference = updateSVGParams();
        window.addEventListener('resize', () => { circumference = updateSVGParams(); resetTimer(); });

        // --- LOGIQUE TIMER ---
        let secondsLeft = 90;
        const TIME_LIMIT = 90;
        let timerInterval = null;
        const circle = document.getElementById('timer-circle');

        // Initialisation du cercle BLEU COMPLET au départ
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = 0;

        window.toggleTimer = function () {
            const btn = document.getElementById('btn-timer');
            if (timerInterval) {
                // MODE PAUSE (Jaune)
                clearInterval(timerInterval); timerInterval = null;
                btn.innerText = "Start";
                btn.className = "btn-watch btn-start";
            } else {
                // MODE START / RESUME (Bleu)
                btn.innerText = "Pause";
                btn.className = "btn-watch btn-pause";
                timerInterval = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft <= 0) {
                        clearInterval(timerInterval); secondsLeft = 0;
                        document.getElementById('timer-display').textContent = "00:00";
                        circle.style.strokeDashoffset = circumference; // Vide à la fin
                        btn.innerText = "Fin";
                        btn.style.background = "var(--error)";
                    } else {
                        updateDisplay();
                        // Le bleu S'EFFACE : l'offset augmente de 0 à circumference
                        const offset = circumference - ((secondsLeft / TIME_LIMIT) * circumference);
                        circle.style.strokeDashoffset = offset;
                    }
                }, 1000);
            }
        }

        window.resetTimer = function () {
            clearInterval(timerInterval); timerInterval = null;
            secondsLeft = TIME_LIMIT;
            updateDisplay();
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = 0; // Remet le cercle BLEU COMPLET
            const btn = document.getElementById('btn-timer');
            btn.innerText = "Start";
            btn.className = "btn-watch btn-start";
            btn.style.background = "var(--accent)";
        }

        function updateDisplay() {
            let m = Math.floor(secondsLeft / 60);
            let s = secondsLeft % 60;
            document.getElementById('timer-display').textContent = `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        window.openModal = (src) => { document.getElementById('myModal').style.display = "flex"; document.getElementById('imgModal').src = src; }
        window.closeModal = () => { document.getElementById('myModal').style.display = "none"; }
        updateDisplay();
    </script>
</body>

</html>
