<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lundi | Workout Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.85);
            --accent: #007aff;
            --watch-case: #0a0a0b;
            --watch-band: #2c2c2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #e2e2ff, transparent), var(--apple-bg);
            background-attachment: fixed;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 120px;
        }

        /* --- BOUTON RETOUR --- */
        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 15px;
        }

        /* --- LA MONTRE AVEC PROFONDEUR 3D --- */
        .watch-banner {
            position: sticky;
            top: 10px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 0 auto 30px auto;
            height: auto;
            min-height: 120px;
        }

        .watch-case {
            width: 28vw;
            height: 28vw;
            max-width: 140px;
            max-height: 140px;
            min-width: 100px;
            min-height: 100px;
            border-radius: 22%;
            flex-shrink: 0;
            z-index: 2;
            position: relative;
            background: var(--watch-case);
            border: 1.5px solid #3a3a3c;
            /* PROFONDEUR ACCENTUÉE */
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.5),
                /* Ombre sous la montre */
                inset 0 0 15px rgba(0, 0, 0, 0.9),
                /* Écran enfoncé sous le verre */
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
            /* Biseau poli sur le bord */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Reflet sur le verre */
        .watch-case::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, transparent 50%);
            pointer-events: none;
            z-index: 4;
        }

        .band-left,
        .band-right {
            height: 18vw;
            max-height: 85px;
            min-height: 62px;
            background: var(--watch-band);
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
            background: linear-gradient(to bottom, #3a3a3c 0%, #2c2c2e 50%, #1c1c1e 100%);
        }

        .band-left {
            border-radius: 40px 0 0 40px;
            justify-content: center;
            border-right: 1px solid #000;
            /* Ombre de jonction */
        }

        .band-right {
            border-radius: 0 40px 40px 0;
            justify-content: center;
            gap: 8px;
            border-left: 1px solid #000;
            /* Ombre de jonction */
        }

        /* Texture Sport Band */
        .band-left::after,
        .band-right::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1.2px, transparent 1.2px);
            background-size: 10px 10px;
            pointer-events: none;
        }

        .timer-wrapper {
            position: relative;
            width: 85%;
            height: 85%;
            /* On force le centrage de tout ce qui est dedans */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #timer-display {
            color: white;
            /* On utilise clamp pour que ce soit beau sur iPhone et PC */
            font-size: clamp(18px, 5vw, 26px);
            font-weight: 800;
            /* POSITION ABSOLUE : C'est le secret pour être AU-DESSUS du cercle */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-shadow: 0 0 10px rgba(0, 122, 255, 0.6);
            font-variant-numeric: tabular-nums;
            margin: 0;
        }

        .progress-ring {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .progress-ring {
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 4px var(--accent));
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            stroke-linecap: round;
        }

        .btn-watch {
            border: none;
            color: white;
            height: 40px;
            width: 75px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(to bottom, #4a4a4c, #2c2c2e);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        .btn-start {
            background: linear-gradient(to bottom, #008aff, #005bb5);
        }

        .btn-pause {
            background: linear-gradient(to bottom, #ffb347, #ff8c00);
        }

        /* --- INPUTS ET CARTES --- */
        .ex-card {
            background: var(--apple-card);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .perf-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-group::after {
            position: absolute;
            right: 15px;
            font-weight: 700;
            color: #86868b;
            font-size: 15px;
        }

        .input-group.weight-group::after {
            content: "kg";
        }

        .input-group.reps-group::after {
            content: "reps";
        }

        .perf-input {
            background: #f2f2f7;
            border: none;
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            outline: none;
        }

        .btn-finish {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: linear-gradient(to bottom, #008aff, #005bb5);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 19px;
        }

        /* --- AJUSTEMENT PC --- */
        @media (min-width: 850px) {
            .container {
                max-width: 800px;
            }

            .watch-banner {
                max-width: 650px;
                height: 160px;
            }

            .btn-watch {
                width: 100px;
                height: 50px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="btn-back">‹ Retour</a>

        <div class="watch-banner">
            <div class="band-left">
                <button class="btn-watch" onclick="resetTimer()">Reset</button>
            </div>
            <div class="watch-case">
                <div class="timer-wrapper">
                    <svg class="progress-ring" viewBox="0 0 100 100">
                        <circle stroke="rgba(255,255,255,0.05)" stroke-width="5" fill="transparent" r="44" cx="50"
                            cy="50" />
                        <circle id="timer-circle" stroke="var(--accent)" stroke-width="5" fill="transparent" r="44"
                            cx="50" cy="50" />
                    </svg>
                    <div id="timer-display">01:30</div>
                </div>
            </div>
            <div class="band-right">
                <button class="btn-watch btn-start" onclick="toggleTimer()" id="btn-timer">Start</button>
            </div>
        </div>

        <header style="margin-bottom: 25px; padding-left: 5px;">
            <p style="font-weight:700; font-size:14px; color:#86868b; text-transform:uppercase;">Lundi</p>
            <h1 style="font-size:36px; font-weight:800; letter-spacing: -1.5px;">Natation</h1>
        </header>

        <form id="workoutForm">
            <div class="ex-card">
                <div class="ex-title">
                    <h3>Echauffement Crwal</h3>
                    <p>10 Longueurs / 20m</p>
                </div>
                <div class="perf-grid">
                    <div class="input-group"><input type="number" class="perf-input weight-input" placeholder="0"></div>
                    <div class="input-group reps-group">
                        <input type="number" class="perf-input reps-input" placeholder="0">
                    </div>
                </div>
            </div>
            <div class="ex-card">
                <div class="ex-title">
                    <h3>3 Nages</h3>
                    <p>10 Longueurs / 20m</p>
                </div>
                <div class="perf-grid">
                    <div class="input-group"><input type="number" class="perf-input weight-input" placeholder="0"></div>
                    <div class="input-group reps-group">
                        <input type="number" class="perf-input reps-input" placeholder="0">
                    </div>
                </div>
            </div>
            <div class="ex-card">
                <div class="ex-title">
                    <h3>Sprint aller / Retour brasse</h3>
                    <p>10 Longueurs / 20m</p>
                </div>
                <div class="perf-grid">
                    <div class="input-group"><input type="number" class="perf-input weight-input" placeholder="0"></div>
                    <div class="input-group reps-group">
                        <input type="number" class="perf-input reps-input" placeholder="0">
                    </div>
                </div>
            </div>
            <div class="ex-card">
                <div class="ex-title">
                    <h3>Crawl</h3>
                    <p>10 Longueurs / 20m</p>
                </div>
                <div class="perf-grid">
                    <div class="input-group"><input type="number" class="perf-input weight-input" placeholder="0"></div>
                    <div class="input-group reps-group">
                        <input type="number" class="perf-input reps-input" placeholder="0">
                    </div>
                </div>
            </div>

            <button type="button" class="btn-finish">Enregistrer la séance</button>
        </form>
    </div>

    <script>
        const circle = document.getElementById('timer-circle');
        const display = document.getElementById('timer-display');
        const btn = document.getElementById('btn-timer');

        const r = 44; // Rayon mis à jour pour la montre XL
        const circumference = 2 * Math.PI * r;

        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = 0;

        let TIME_LIMIT = 90;
        let secondsLeft = TIME_LIMIT;
        let timerInterval = null;

        function updateDisplay() {
            let m = Math.floor(secondsLeft / 60);
            let s = secondsLeft % 60;
            display.textContent = `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        function setProgress() {
            const fraction = (TIME_LIMIT - secondsLeft) / TIME_LIMIT;
            const offset = fraction * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function toggleTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = "Start";
                btn.classList.remove('btn-pause');
                btn.classList.add('btn-start');
            } else {
                btn.innerText = "Pause";
                btn.classList.remove('btn-start');
                btn.classList.add('btn-pause');

                timerInterval = setInterval(() => {
                    secondsLeft--;
                    updateDisplay();
                    setProgress();
                    if (secondsLeft <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        btn.innerText = "Fin";
                        if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            secondsLeft = TIME_LIMIT;
            updateDisplay();
            circle.style.strokeDashoffset = 0;
            btn.innerText = "Start";
            btn.classList.remove('btn-pause');
            btn.classList.add('btn-start');
        }

        updateDisplay();
    </script>
</body>

</html>
