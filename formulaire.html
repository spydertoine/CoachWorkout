<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ton Profil | Workout Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --accent: #007aff;
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-sub: #86868b;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #e2e2ff, transparent),
                radial-gradient(circle at bottom left, #ffe2e2, transparent),
                var(--apple-bg);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .form-card {
            background: var(--apple-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            text-align: center;
            color: #1d1d1f;
        }

        .subtitle {
            text-align: center;
            color: var(--apple-sub);
            margin-bottom: 30px;
            font-size: 15px;
            display: block;
        }

        .group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--apple-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus,
        select:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2);
        }

        .btn-submit:disabled {
            background: #d2d2d7;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-submit:active:not(:disabled) {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <div class="form-card">
        <h1>Parlons de toi 👋</h1>
        <span class="subtitle">Crée ton profil pour personnaliser tes séances</span>

        <form id="anamneseForm">
            <div class="group">
                <label>Prénom</label>
                <input type="text" id="prenom" placeholder="Ton prénom" required>
            </div>
            <div class="group">
                <label>Âge</label>
                <input type="number" id="age" placeholder="Ex: 25" required>
            </div>
            <div class="group">
                <label>Taille (cm)</label>
                <input type="number" id="taille" placeholder="Ex: 175" required>
            </div>
            <div class="group">
                <label>Poids actuel (kg)</label>
                <input type="number" id="poids" placeholder="Ex: 70" required>
            </div>

            <div class="group">
                <label>Fréquence sportive avant</label>
                <select id="freqAvant">
                    <option value="0">Aucune (Débutant)</option>
                    <option value="1-2">1 à 2 fois / semaine</option>
                    <option value="3-4">3 à 4 fois / semaine</option>
                    <option value="5+">5 fois ou plus (Athlète)</option>
                </select>
            </div>

            <div class="group">
                <label>Objectif (séances/semaine)</label>
                <input type="number" id="objectif" placeholder="Ex: 4" required>
            </div>

            <button type="button" class="btn-submit" id="submitBtn">Créer mon programme</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCZG_v85vVulpoWPBhtHqgWTwgQ4OqvFw",
            authDomain: "coachworkout-65b99.firebaseapp.com",
            projectId: "coachworkout-65b99",
            storageBucket: "coachworkout-65b99.firebasestorage.app",
            messagingSenderId: "78930491774",
            appId: "1:78930491774:web:d480943e82efa2db451b2f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return alert("Veuillez vous connecter d'abord.");

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Enregistrement...";
            btn.disabled = true;

            const data = {
                prenom: document.getElementById('prenom').value,
                age: document.getElementById('age').value,
                taille: document.getElementById('taille').value,
                poids: document.getElementById('poids').value,
                freqAvant: document.getElementById('freqAvant').value,
                objectif: document.getElementById('objectif').value,
                email: user.email
            };

            try {
                await setDoc(doc(db, "users", user.uid), data);
                localStorage.setItem('userProfile', JSON.stringify(data));
                window.location.href = 'index.html';
            } catch (error) {
                alert("Erreur base de données : " + error.message);
                btn.disabled = false;
                btn.innerText = "Créer mon programme";
            }
        });
    </script>
</body>

</html>
