<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configuration Profil | Workout Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --accent: #007aff;
            --apple-card: rgba(255, 255, 255, 0.85);
            --apple-sub: #86868b;
            --border-color: rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 45, 85, 0.05) 0px, transparent 50%),
                var(--apple-bg);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- CARTE ARCHITECTURALE --- */
        .form-card {
            background: var(--apple-card);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.1), 
                0 0 0 1px var(--border-color);
            width: 100%;
            max-width: 460px;
            box-sizing: border-box;
        }

        header {
            text-align: left;
            margin-bottom: 40px;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 10px;
            color: #1d1d1f;
        }

        .subtitle {
            color: var(--apple-sub);
            font-size: 14px;
            font-weight: 500;
            display: block;
        }

        /* --- LAYOUT DENSE --- */
        .section-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            display: block;
            opacity: 0.8;
        }

        .group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 11px;
            color: #1d1d1f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.2s ease-in-out;
        }

        input:focus, select:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* --- BOUTON MASSIF --- */
        .btn-submit {
            width: 100%;
            background: #1d1d1f; /* Noir profond Apple */
            color: white;
            border: none;
            padding: 22px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .btn-submit:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            background: #d2d2d7;
            cursor: not-allowed;
            transform: none;
        }

        /* --- ANIMATION --- */
        @keyframes reveal {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .form-card {
            animation: reveal 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>

<body>

    <div class="form-card">
        <header>
            <h1>Configuration</h1>
            <span class="subtitle">Initialisation de votre profil athlète</span>
        </header>

        <form id="anamneseForm">
            <span class="section-label">Identité & Biométrie</span>
            
            <div class="group">
                <label>Prénom</label>
                <input type="text" id="prenom" placeholder="Saisir le prénom" required>
            </div>

            <div class="row">
                <div class="group">
                    <label>Âge</label>
                    <input type="number" id="age" placeholder="Années" required>
                </div>
                <div class="group">
                    <label>Taille</label>
                    <input type="number" id="taille" placeholder="cm" required>
                </div>
            </div>

            <div class="group">
                <label>Poids Actuel</label>
                <input type="number" id="poids" placeholder="Kilogrammes" required>
            </div>

            <span class="section-label" style="margin-top: 10px;">Objectifs de Performance</span>

            <div class="group">
                <label>Niveau d'activité</label>
                <select id="freqAvant">
                    <option value="0">Sédentaire / Débutant</option>
                    <option value="1-2">Occasionnel (1-2x/sem)</option>
                    <option value="3-4">Régulier (3-4x/sem)</option>
                    <option value="5+">Intensif (5x+/sem)</option>
                </select>
            </div>

            <div class="group">
                <label>Fréquence cible (séances)</label>
                <input type="number" id="objectif" placeholder="Volume hebdomadaire" required>
            </div>

            <button type="button" class="btn-submit" id="submitBtn">Finaliser le profil</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCZG_v85vVulpoWPBhtHqgWTwgQ4OqvFw",
            authDomain: "coachworkout-65b99.firebaseapp.com",
            projectId: "coachworkout-65b99",
            storageBucket: "coachworkout-65b99.firebasestorage.app",
            messagingSenderId: "78930491774",
            appId: "1:78930491774:web:d480943e82efa2db451b2f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login.html';
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Traitement...";
            btn.disabled = true;

            const data = {
                prenom: document.getElementById('prenom').value,
                age: document.getElementById('age').value,
                taille: document.getElementById('taille').value,
                poids: document.getElementById('poids').value,
                freqAvant: document.getElementById('freqAvant').value,
                objectif: document.getElementById('objectif').value,
                email: user.email,
                timestamp: new Date()
            };

            try {
                await setDoc(doc(db, "users", user.uid), data);
                window.location.href = 'index.html';
            } catch (error) {
                alert("Erreur système : " + error.message);
                btn.disabled = false;
                btn.innerText = "Finaliser le profil";
            }
        });
    </script>
</body>

</html>
