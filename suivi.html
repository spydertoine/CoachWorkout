<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Suivi Santé | Workout Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --apple-bg: #f5f5f7; 
            --accent: #007aff; 
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-sub: #86868b;
            --prot: #ff3b30; --glu: #ff9f0a; --lip: #34c759;
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, sans-serif; 
            background: radial-gradient(circle at top right, #e2e2ff, transparent),
                        radial-gradient(circle at bottom left, #ffe2e2, transparent),
                        var(--apple-bg);
            background-attachment: fixed;
            margin: 0; padding: 40px 20px; -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
        .back-link { text-decoration: none; color: var(--accent); font-weight: 600; display: block; margin-bottom: 20px; }

        header { margin-bottom: 30px; }
        .welcome-label { color: var(--apple-sub); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; display: block; }
        h1 { font-size: 34px; font-weight: 800; letter-spacing: -1.5px; margin: 5px 0; }

        .stat-card {
            background: var(--apple-card);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 25px; border-radius: 24px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .stat-label { color: var(--apple-sub); font-size: 12px; font-weight: 700; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 32px; font-weight: 800; color: #1d1d1f; }
        
        .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; }
        .macro-item { text-align: center; padding: 15px; border-radius: 18px; background: rgba(255,255,255,0.4); }
        .macro-name { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .macro-val { font-size: 20px; font-weight: 800; }

        /* Grille d'édition */
        .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        
        .input-styled {
            width: 100%; border: none; background: rgba(0,0,0,0.05); padding: 16px;
            border-radius: 14px; font-size: 18px; font-weight: 700; font-family: inherit;
            box-sizing: border-box; color: var(--accent); outline: none;
            transition: 0.2s;
        }
        .input-styled:focus { background: rgba(255,255,255,0.8); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }

        .btn-sync {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 20px; border-radius: 20px; font-weight: 700; font-size: 17px;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.25);
        }
        .btn-sync:active { transform: scale(0.96); }
        .btn-sync:disabled { background: #d2d2d7; box-shadow: none; }

        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">‹ Dashboard</a>
        
        <header>
            <span class="welcome-label">Profil & Santé</span>
            <h1>Mon Suivi</h1>
        </header>

        <div class="stat-card">
            <div class="input-group">
                <span class="stat-label">Prénom</span>
                <input type="text" id="prenom-input" class="input-styled" placeholder="Ton prénom">
            </div>

            <div class="edit-grid">
                <div>
                    <span class="stat-label">Âge</span>
                    <input type="number" id="age-input" class="input-styled" placeholder="Âge">
                </div>
                <div>
                    <span class="stat-label">Taille (cm)</span>
                    <input type="number" id="taille-input" class="input-styled" placeholder="Taille">
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 0;">
                <span class="stat-label">Poids actuel (kg)</span>
                <input type="number" id="poids-input" class="input-styled" step="0.1" placeholder="Poids">
            </div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Indice de Masse Corporelle (IMC)</span>
            <div id="imc-value" class="stat-value">--</div>
            <div id="imc-status" class="badge">Analyse...</div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Besoins Journaliers</span>
            <div id="cal-value" class="stat-value">-- <span style="font-size: 16px; color: var(--apple-sub);">kcal/jour</span></div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Objectifs Macros</span>
            <div class="macro-grid">
                <div class="macro-item" style="color: var(--prot);">
                    <div class="macro-name">Protéines</div>
                    <div class="macro-val" id="m-prot">--</div>
                    <div style="font-size: 10px; font-weight: 600;">grammes</div>
                </div>
                <div class="macro-item" style="color: var(--glu);">
                    <div class="macro-name">Glucides</div>
                    <div class="macro-val" id="m-glu">--</div>
                    <div style="font-size: 10px; font-weight: 600;">grammes</div>
                </div>
                <div class="macro-item" style="color: var(--lip);">
                    <div class="macro-name">Lipides</div>
                    <div class="macro-val" id="m-lip">--</div>
                    <div style="font-size: 10px; font-weight: 600;">grammes</div>
                </div>
            </div>
        </div>

        <button id="btn-update" class="btn-sync">Mettre à jour mon profil</button>
        <p style="text-align: center; font-size: 12px; color: var(--apple-sub); margin-top: 15px;">
            Synchronisation Cloud active • <span id="last-sync">--</span>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCZG_v85vVulpoWPBhtHqgWTwgQ4OqvFw",
            authDomain: "coachworkout-65b99.firebaseapp.com",
            projectId: "coachworkout-65b99",
            storageBucket: "coachworkout-65b99.firebasestorage.app",
            messagingSenderId: "78930491774",
            appId: "1:78930491774:web:d480943e82efa2db451b2f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    updateUI();
                }
            } else { window.location.href = "login.html"; }
        });

        function updateUI() {
            const P = parseFloat(userData.poids) || 0;
            const T = parseFloat(userData.taille) || 0;
            const A = parseInt(userData.age) || 0;
            const Nom = userData.prenom || "";
            
            document.getElementById('prenom-input').value = Nom;
            document.getElementById('age-input').value = A;
            document.getElementById('poids-input').value = P;
            document.getElementById('taille-input').value = T;

            // IMC
            if (T > 0 && P > 0) {
                const imc = (P / ((T/100) * (T/100))).toFixed(1);
                document.getElementById('imc-value').innerText = imc;
                const status = document.getElementById('imc-status');
                if (imc < 18.5) { status.innerText = "Poids faible"; status.style.background = "#ff9f0a"; }
                else if (imc < 25) { status.innerText = "Poids idéal"; status.style.background = "#34c759"; status.style.color = "white"; }
                else { status.innerText = "Surpoids"; status.style.background = "#ff3b30"; status.style.color = "white"; }

                // Calories (Mifflin-St Jeor)
                const bmr = (10 * P) + (6.25 * T) - (5 * A) + 5;
                const tdee = Math.round(bmr * 1.375);
                document.getElementById('cal-value').innerHTML = `${tdee} <span style="font-size: 16px; color: var(--apple-sub);">kcal/jour</span>`;

                // Macros
                document.getElementById('m-prot').innerText = Math.round((tdee * 0.30) / 4);
                document.getElementById('m-glu').innerText = Math.round((tdee * 0.45) / 4);
                document.getElementById('m-lip').innerText = Math.round((tdee * 0.25) / 9);
            }

            document.getElementById('last-sync').innerText = new Date().toLocaleTimeString();
        }

        document.getElementById('btn-update').onclick = async () => {
            const btn = document.getElementById('btn-update');
            const updatedData = {
                prenom: document.getElementById('prenom-input').value,
                age: document.getElementById('age-input').value,
                poids: document.getElementById('poids-input').value,
                taille: document.getElementById('taille-input').value
            };

            btn.innerText = "Synchronisation...";
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "users", currentUser.uid), updatedData);
                
                // Mise à jour de la mémoire locale pour l'affichage immédiat
                Object.assign(userData, updatedData);
                updateUI();
                
                btn.innerText = "Profil à jour !";
                setTimeout(() => { btn.disabled = false; btn.innerText = "Mettre à jour mon profil"; }, 2000);
            } catch (e) {
                alert("Erreur : " + e.message);
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
