<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Suivi | Workout Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --apple-bg: #f5f5f7; --accent: #007aff; --apple-sub: #86868b; }
        body { font-family: 'SF Pro Display', sans-serif; background: var(--apple-bg); color: #1d1d1f; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .back-link { text-decoration: none; color: var(--accent); font-weight: 600; display: block; margin-bottom: 20px; }
        .card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        h2 { font-size: 18px; color: var(--apple-sub); margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: var(--apple-bg); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-val { display: block; font-size: 24px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--apple-sub); text-transform: uppercase; }
        input { width: 80px; border: none; background: #e5e5ea; border-radius: 8px; padding: 5px; text-align: center; font-weight: 800; font-family: inherit; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">‹ Retour</a>
        <h1>Suivi Santé</h1>
        <h2 id="userNameDisplay">Profil de ...</h2>

        <div class="card">
            <div class="stat-grid">
                <div class="stat-box">
                    <span class="stat-label">Poids (kg)</span>
                    <input type="number" id="editPoids" oninput="updateStats()">
                </div>
                <div class="stat-box">
                    <span class="stat-label">Taille (cm)</span>
                    <input type="number" id="editTaille" oninput="updateStats()">
                </div>
            </div>
        </div>

        <div class="card" style="background: var(--accent); color: white;">
            <span class="stat-label" style="color: rgba(255,255,255,0.7)">Ton IMC Actuel</span>
            <span class="stat-val" id="imcDisplay" style="color: white; font-size: 48px;">--</span>
            <p id="imcDesc" style="font-weight: 600; margin-top: 10px;"></p>
        </div>

        <div class="card">
            <h3>Macros Objectif (Journalier)</h3>
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-label">Protéines</span><span class="stat-val" id="protDisplay">--</span></div>
                <div class="stat-box"><span class="stat-label">Lipides</span><span class="stat-val" id="lipDisplay">--</span></div>
            </div>
        </div>
    </div>

    <script>
        const profile = JSON.parse(localStorage.getItem('userProfile'));
        
        window.onload = function() {
            if(profile) {
                document.getElementById('userNameDisplay').innerText = "Profil de " + profile.prenom;
                document.getElementById('editPoids').value = profile.poids;
                document.getElementById('editTaille').value = profile.taille;
                updateStats();
            }
        };

        function updateStats() {
            const p = parseFloat(document.getElementById('editPoids').value);
            const t = parseFloat(document.getElementById('editTaille').value) / 100;

            if (p && t) {
                // Calcul IMC
                const imc = (p / (t * t)).toFixed(1);
                document.getElementById('imcDisplay').innerText = imc;
                
                let desc = "";
                if(imc < 18.5) desc = "Insuffisance pondérale";
                else if(imc < 25) desc = "Poids normal";
                else if(imc < 30) desc = "Surpoids";
                else desc = "Obésité";
                document.getElementById('imcDesc').innerText = desc;

                // Calcul Macros (Bases : Prot 2g/kg, Lip 1g/kg)
                document.getElementById('protDisplay').innerText = Math.round(p * 2) + "g";
                document.getElementById('lipDisplay').innerText = Math.round(p * 1) + "g";
                
                // On sauvegarde le changement pour que l'index s'en souvienne
                profile.poids = p;
                profile.taille = t * 100;
                localStorage.setItem('userProfile', JSON.stringify(profile));
            }
        }
    </script>
</body>
</html>
